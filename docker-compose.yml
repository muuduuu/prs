services:
  prs-agent:
    build: .
    ports:
      - "8787:8787"
    environment:
      PRS_MOBSF_URL: "http://mobsf:8000"
    volumes:
      - ./runs:/app/runs
      - ./uploads:/app/uploads
    depends_on:
      - mobsf

  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    ports:
      - "8000:8000"
    volumes:
      - mobsf-data:/home/mobsf/.MobSF

volumes:
  mobsf-data:
